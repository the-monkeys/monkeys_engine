swagger: "2.0"
info:
  title: The Monkeys Blog API
  description: API documentation for The Monkeys Blog Service v2
  version: 2.0.0
  contact:
    name: The Monkeys Team
basePath: /api/v2
tags:
  - name: Blog
    description: Blog management endpoints
consumes:
  - application/json
produces:
  - application/json
  
paths:
  /blog/search:
    get:
      tags:
        - Blog
      summary: "[DEPRECATED] Search blogs (legacy)"
      description: >
        DEPRECATED — Phase 5 of Search v2 deprecation.

        This route now returns 308 Permanent Redirect to
        `/api/v2/blog/search/v2` with the original query string preserved.
        The v2 engine accepts the legacy `search_term` parameter as a
        back-compat alias for `q`, so existing GET clients keep working
        without code changes.

        Scheduled for removal one release after the v3 index is steady.
      deprecated: true
      operationId: searchBlogsLegacy
      parameters:
        - name: search_term
          in: query
          description: Search text (forwarded as `q` to the v2 engine).
          required: true
          type: string
        - name: limit
          in: query
          required: false
          type: integer
          default: 20
      responses:
        '308':
          description: Permanent Redirect to `/api/v2/blog/search/v2`.

  /blog/search/v2:
    get:
      tags:
        - Blog
      summary: Search blogs (v2 — ranked, highlighted, cursor-paginated)
      description: >
        Elasticsearch-backed full-text blog search. Ranking uses
        `function_score` with a 90-day Gaussian recency decay plus a
        `log1p(like_count)` popularity boost on top of a `multi_match`
        (best_fields, AND) over title, summary, body, tags and author
        fields with `AUTO:4,7` fuzziness. Rate limited to 30 req/s per
        client. Response is cached at the gateway for 60 s.
      operationId: searchBlogsV2
      parameters:
        - name: q
          in: query
          description: Search text (1–128 chars). Alias `search_term` accepted for back-compat.
          required: true
          type: string
          minLength: 1
          maxLength: 128
        - name: limit
          in: query
          required: false
          type: integer
          default: 20
          maximum: 50
        - name: cursor
          in: query
          description: Opaque base64url-encoded cursor returned as `next_cursor` from the previous page.
          required: false
          type: string
      responses:
        '200':
          description: Successful operation
          schema:
            type: object
            properties:
              hits:
                type: array
                items:
                  $ref: '#/definitions/BlogSearchHit'
              next_cursor:
                type: string
                description: Cursor for the next page; absent on the last page.
              took_ms:
                type: integer
              total:
                type: integer
                description: Approximate total match count from Elasticsearch.
        '400':
          description: Invalid input (missing `q`, out-of-range `limit`, malformed `cursor`).
          schema:
            $ref: '#/definitions/Error'
        '429':
          description: Rate limit exceeded.

  /search/suggest:
    get:
      tags:
        - Blog
      summary: Autocomplete (title suggestions)
      description: >
        Edge-ngram-backed autocomplete over blog titles. Gated to queries
        of 2+ characters. Fails closed — returns `{ "hits": [] }` on any
        backend error so the UI is never blocked. Rate limited to
        30 req/s; gateway-side Redis cache TTL is 30 s.
      operationId: searchSuggest
      parameters:
        - name: q
          in: query
          required: true
          type: string
          minLength: 2
          maxLength: 128
        - name: limit
          in: query
          required: false
          type: integer
          default: 5
          maximum: 10
      responses:
        '200':
          description: Successful operation
          schema:
            type: object
            properties:
              hits:
                type: array
                items:
                  $ref: '#/definitions/BlogSuggestHit'

  /blog/tags:
    post:
      tags:
        - Blog
      summary: Get blogs by tags
      description: Retrieve blogs that match the specified tags
      operationId: getBlogsByTags
      parameters:
        - name: limit
          in: query
          description: Number of blogs to return
          required: false
          type: integer
          default: 20
        - name: offset
          in: query
          description: Number of blogs to skip for pagination
          required: false
          type: integer
          default: 0
        - name: body
          in: body
          description: Tags to filter blogs
          required: true
          schema:
            type: object
            properties:
              tags:
                type: array
                items:
                  type: string
                description: Tags to filter blogs
                example: ["tech", "cloud"]
            required:
              - tags
      responses:
        '200':
          description: Successful operation
          schema:
            type: object
            properties:
              total_blogs:
                type: integer
              blogs:
                type: array
                items:
                  $ref: '#/definitions/BlogMetadata'
        '400':
          description: Invalid input
          schema:
            $ref: '#/definitions/Error'
        '500':
          description: Internal server error
          schema:
            $ref: '#/definitions/Error'

  /blog/meta-feed:
    post:
      tags:
        - Blog
      summary: Get feed posts metadata
      description: Get metadata for blog feed posts
      operationId: getFeedPostsMeta
      parameters:
        - name: limit
          in: query
          description: Number of blogs to return
          required: false
          type: integer
          default: 20
        - name: offset
          in: query
          description: Number of blogs to skip for pagination
          required: false
          type: integer
          default: 0
        - name: body
          in: body
          required: false
          schema:
            type: object
      responses:
        '200':
          description: Successful operation
          schema:
            type: object
            properties:
              total_blogs:
                type: integer
              blogs:
                type: array
                items:
                  $ref: '#/definitions/BlogMetadata'
        '500':
          description: Internal server error
          schema:
            $ref: '#/definitions/Error'

  /blog/feed:
    get:
      tags:
        - Blog
      summary: Get latest blogs
      description: Get the latest published blogs
      operationId: getLatestBlogs
      parameters:
        - name: limit
          in: query
          description: Number of blogs to return
          required: false
          type: integer
          default: 20
        - name: offset
          in: query
          description: Number of blogs to skip for pagination
          required: false
          type: integer
          default: 0
      responses:
        '200':
          description: Successful operation
          schema:
            type: object
            properties:
              total_blogs:
                type: integer
              blogs:
                type: array
                items:
                  $ref: '#/definitions/Blog'
        '500':
          description: Internal server error
          schema:
            $ref: '#/definitions/Error'

  /blog/all/{username}:
    get:
      tags:
        - Blog
      summary: Get user's public blogs
      description: Get all published blogs by a specific username
      operationId: getUsersBlogs
      parameters:
        - name: username
          in: path
          description: Username to get blogs for
          required: true
          type: string
        - name: limit
          in: query
          description: Number of blogs to return
          required: false
          type: integer
          default: 20
        - name: offset
          in: query
          description: Number of blogs to skip for pagination
          required: false
          type: integer
          default: 0
      responses:
        '200':
          description: Successful operation
          schema:
            type: object
            properties:
              blogs:
                type: array
                items:
                  $ref: '#/definitions/Blog'
        '404':
          description: User not found
          schema:
            $ref: '#/definitions/Error'
        '500':
          description: Internal server error
          schema:
            $ref: '#/definitions/Error'

  /blog/{blog_id}:
    get:
      tags:
        - Blog
      summary: Get published blog by ID
      description: Get a published blog by its ID
      operationId: getPublishedBlogByBlogId
      parameters:
        - name: blog_id
          in: path
          description: ID of the blog to retrieve
          required: true
          type: string
      responses:
        '200':
          description: Successful operation
          schema:
            $ref: '#/definitions/Blog'
        '404':
          description: Blog not found
          schema:
            $ref: '#/definitions/Error'
        '500':
          description: Internal server error
          schema:
            $ref: '#/definitions/Error'

  # Protected APIs (require authentication)
  /blog/following:
    get:
      tags:
        - Blog
      summary: Get blogs from accounts the user follows
      description: Get blogs from accounts the user follows (requires authentication)
      operationId: followingBlogsFeed
      parameters:
        - name: limit
          in: query
          description: Number of blogs to return
          required: false
          type: integer
          default: 20
        - name: offset
          in: query
          description: Number of blogs to skip for pagination
          required: false
          type: integer
          default: 0
      responses:
        '200':
          description: Successful operation
          schema:
            type: object
            properties:
              blogs:
                type: array
                items:
                  $ref: '#/definitions/Blog'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/Error'
        '500':
          description: Internal server error
          schema:
            $ref: '#/definitions/Error'
      security:
        - Bearer: []

  /blog/my-drafts:
    get:
      tags:
        - Blog
      summary: Get user's draft blogs
      description: Get all draft blogs for the authenticated user
      operationId: myDraftBlogs
      parameters:
        - name: limit
          in: query
          description: Number of blogs to return
          required: false
          type: integer
          default: 20
        - name: offset
          in: query
          description: Number of blogs to skip for pagination
          required: false
          type: integer
          default: 0
      responses:
        '200':
          description: Successful operation
          schema:
            type: object
            properties:
              blogs:
                type: array
                items:
                  $ref: '#/definitions/Blog'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/Error'
        '500':
          description: Internal server error
          schema:
            $ref: '#/definitions/Error'
      security:
        - Bearer: []

  /blog/my-published:
    get:
      tags:
        - Blog
      summary: Get user's published blogs
      description: Get all published blogs for the authenticated user
      operationId: myPublishedBlogs
      parameters:
        - name: limit
          in: query
          description: Number of blogs to return
          required: false
          type: integer
          default: 20
        - name: offset
          in: query
          description: Number of blogs to skip for pagination
          required: false
          type: integer
          default: 0
      responses:
        '200':
          description: Successful operation
          schema:
            type: object
            properties:
              blogs:
                type: array
                items:
                  $ref: '#/definitions/Blog'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/Error'
        '500':
          description: Internal server error
          schema:
            $ref: '#/definitions/Error'
      security:
        - Bearer: []

  /blog/my-bookmarks:
    get:
      tags:
        - Blog
      summary: Get user's bookmarked blogs
      description: Get all bookmarked blogs for the authenticated user
      operationId: myBookmarks
      parameters:
        - name: limit
          in: query
          description: Number of blogs to return
          required: false
          type: integer
          default: 20
        - name: offset
          in: query
          description: Number of blogs to skip for pagination
          required: false
          type: integer
          default: 0
      responses:
        '200':
          description: Successful operation
          schema:
            type: object
            properties:
              blogs:
                type: array
                items:
                  $ref: '#/definitions/Blog'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/Error'
        '500':
          description: Internal server error
          schema:
            $ref: '#/definitions/Error'
      security:
        - Bearer: []

  # Authorization required APIs
  /blog/draft/{blog_id}:
    get:
      tags:
        - Blog
      summary: Get draft blog for editing
      description: Get a draft blog for editing (requires authorization)
      operationId: writeBlog
      parameters:
        - name: blog_id
          in: path
          description: ID of the draft blog to edit
          required: true
          type: string
      responses:
        '200':
          description: Successful operation
          schema:
            $ref: '#/definitions/Blog'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/Error'
        '403':
          description: Forbidden - User doesn't have edit access
          schema:
            $ref: '#/definitions/Error'
        '404':
          description: Blog not found
          schema:
            $ref: '#/definitions/Error'
        '500':
          description: Internal server error
          schema:
            $ref: '#/definitions/Error'
      security:
        - Bearer: []

  /blog/to-draft/{blog_id}:
    post:
      tags:
        - Blog
      summary: Move a published blog back to draft
      description: Move a published blog back to draft status (requires authorization)
      operationId: moveBlogToDraft
      parameters:
        - name: blog_id
          in: path
          description: ID of the blog to move to draft
          required: true
          type: string
      responses:
        '200':
          description: Successful operation
          schema:
            type: object
            properties:
              message:
                type: string
                example: "Blog moved to draft successfully"
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/Error'
        '403':
          description: Forbidden - User doesn't have edit access
          schema:
            $ref: '#/definitions/Error'
        '404':
          description: Blog not found
          schema:
            $ref: '#/definitions/Error'
        '500':
          description: Internal server error
          schema:
            $ref: '#/definitions/Error'
      security:
        - Bearer: []

  /blog/my-draft/{blog_id}:
    get:
      tags:
        - Blog
      summary: Get specific draft blog
      description: Get a specific draft blog by ID (requires authorization)
      operationId: getDraftBlogByBlogIdV2
      parameters:
        - name: blog_id
          in: path
          description: ID of the draft blog to retrieve
          required: true
          type: string
      responses:
        '200':
          description: Successful operation
          schema:
            $ref: '#/definitions/Blog'
        '401':
          description: Unauthorized
          schema:
            $ref: '#/definitions/Error'
        '403':
          description: Forbidden - User doesn't have edit access
          schema:
            $ref: '#/definitions/Error'
        '404':
          description: Blog not found
          schema:
            $ref: '#/definitions/Error'
        '500':
          description: Internal server error
          schema:
            $ref: '#/definitions/Error'
      security:
        - Bearer: []

definitions:
  BlogSearchHit:
    type: object
    description: Single ranked blog hit returned by `/blog/search/v2`.
    properties:
      blog_id: { type: string }
      title: { type: string }
      summary: { type: string }
      slug: { type: string }
      author_username: { type: string }
      author_display_name: { type: string }
      owner_account_id: { type: string }
      published_time: { type: string, format: date-time }
      like_count: { type: integer }
      view_count: { type: integer }
      tags:
        type: array
        items: { type: string }
      score: { type: number, format: float }
      highlight:
        type: object
        description: >
          Per-field highlight fragments wrapped in `<mark>` tags.
          Sanitised server-side. Only the keys listed are emitted.
        properties:
          title:
            type: array
            items: { type: string }
          summary:
            type: array
            items: { type: string }
          body:
            type: array
            items: { type: string }

  BlogSuggestHit:
    type: object
    description: Slim title-only hit for `/search/suggest`.
    properties:
      blog_id: { type: string }
      title: { type: string }
      slug: { type: string }
      author_username: { type: string }
      published_time: { type: string, format: date-time }

  BlogMetadata:
    type: object
    properties:
      blog_id:
        type: string
        description: Unique identifier for the blog
      owner_account_id:
        type: string
        description: Account ID of the blog owner
      title:
        type: string
        description: Blog title
      first_paragraph:
        type: string
        description: First paragraph of the blog content
      first_image:
        type: string
        description: URL of the first image in the blog
      content_type:
        type: string
        description: Type of the blog content (e.g., "editor")
      published_time:
        type: string
        format: date-time
        description: Time when the blog was published
      tags:
        type: array
        items:
          type: string
        description: List of tags associated with the blog
      like_count:
        type: integer
        description: Number of likes on the blog
      bookmark_count:
        type: integer
        description: Number of times the blog has been bookmarked

  Blog:
    type: object
    properties:
      blog_id:
        type: string
        description: Unique identifier for the blog
      owner_account_id:
        type: string
        description: Account ID of the blog owner
      blog:
        type: object
        properties:
          time:
            type: string
            format: date-time
          blocks:
            type: array
            items:
              $ref: '#/definitions/Block'
      tags:
        type: array
        items:
          type: string
        description: List of tags associated with the blog
      is_draft:
        type: boolean
        description: Whether the blog is a draft or published
      content_type:
        type: string
        description: Type of the blog content (e.g., "editor")
      published_time:
        type: string
        format: date-time
        description: Time when the blog was published

  Block:
    type: object
    properties:
      type:
        type: string
        description: Type of the block (e.g., "header", "paragraph", "image")
      data:
        type: object
        description: Data content of the block
        properties:
          text:
            type: string
            description: Text content for paragraphs and headers
          level:
            type: integer
            description: Heading level (for header blocks)
          file:
            type: object
            properties:
              url:
                type: string
                description: URL of the file (for image blocks)

  Error:
    type: object
    properties:
      message:
        type: string
        description: Error message

securityDefinitions:
  Bearer:
    type: apiKey
    name: Authorization
    in: header
    description: JWT token prefixed with "Bearer "
